<!DOCTYPE html>

<meta charset="UTF-8"/>
<title>Frappe System Map</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden;background:#f0f2f5}
#sidebar{width:200px;min-width:200px;background:#1a1a2e;color:#eee;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;z-index:10}
#sidebar h2{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.mi{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;user-select:none;transition:background .12s}
.mi:hover,.mi.active{background:#2a2a4e}
.mi.active{outline:1px solid #444}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#fff;border-bottom:1px solid #ddd;flex-shrink:0}
#topbar input{flex:1;padding:5px 10px;border:1px solid #ccc;border-radius:5px;font-size:13px;outline:none}
#topbar input:focus{border-color:#2980b9}
.btn{padding:4px 11px;border:1px solid #ccc;border-radius:5px;background:#fff;cursor:pointer;font-size:12px;white-space:nowrap}
.btn:hover{background:#f0f0f0}
.btn.on{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
#cy{flex:1}
/* tooltip */
#tip{position:fixed;background:#1a1a2e;color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;pointer-events:none;display:none;z-index:100;max-width:200px;line-height:1.5}
/* info panel */
#panel{position:absolute;right:0;top:0;width:260px;height:100%;background:#fff;border-left:1px solid #ddd;padding:14px;overflow-y:auto;transform:translateX(100%);transition:transform .22s;z-index:20}
#panel.open{transform:translateX(0)}
#panel h3{font-size:14px;font-weight:700;margin-bottom:4px;padding-right:22px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;color:#fff;margin-bottom:10px}
#panel h4{font-size:10px;color:#999;text-transform:uppercase;margin:10px 0 4px}
#panel ul{list-style:none}
#panel li{font-size:12px;padding:3px 0;border-bottom:1px solid #f5f5f5;cursor:pointer;color:#2980b9}
#panel li:hover{text-decoration:underline}
#panel li small{color:#aaa;font-size:11px}
#xbtn{position:absolute;top:10px;right:10px;background:none;border:none;font-size:18px;cursor:pointer;color:#aaa}
</style>
</head>
<body>
<div id="sidebar">
  <h2>Modules</h2>
  <div id="mod-list"></div>
</div>
<div id="main" style="position:relative">
  <div id="topbar">
    <input id="search" placeholder="Search node…"/>
    <button class="btn" id="btn-labels">Edge Labels</button>
    <button class="btn" id="btn-reset">Reset</button>
    <button class="btn" id="btn-fit">Fit</button>
  </div>
  <div id="cy"></div>
  <div id="tip"></div>
  <div id="panel">
    <button id="xbtn">×</button>
    <h3 id="p-name"></h3>
    <span id="p-badge" class="badge"></span>
    <h4>Outgoing</h4><ul id="p-out"></ul>
    <h4>Incoming</h4><ul id="p-in"></ul>
  </div>
</div>

// Build cytoscape elements
const elements = [];

// nodes
Object.keys(NM).forEach(id => {
  const mod = NM[id];
  elements.push({
    data: { id, label: id, module: mod, color: MOD_COLOR[mod], url: NODE_URL[id] || '' }
  });
});

// edges — deduplicate same source+target by curving
const edgeCount = {};
EDGES_RAW.forEach(([s,t,lbl], i) => {
  const key = s+'→'+t;
  edgeCount[key] = (edgeCount[key]||0)+1;
  elements.push({
    data: {
      id: `e${i}`, source: s, target: t, label: lbl,
      color: MOD_COLOR[NM[s]] || '#999',
      curve: edgeCount[key] > 1 ? 'unbundled-bezier' : 'bezier',
    }
  });
});

  elements,
  style: [

      style: {

        'font-size': '10px',
        'text-valign': 'bottom',

    rankDir: 'LR',
    nodeSep: 50,
    rankSep: 120,
    edgeSep: 10,
    ranker: 'network-simplex',
    animate: false,
  },
  wheelSensitivity: 0.3,
});

// ── EDGE LABELS TOGGLE ────────────────────────────────────────────────────────
let labelsOn = false;
document.getElementById('btn-labels').addEventListener('click', function(){
  labelsOn = !labelsOn;
  cy.edges().style('label', labelsOn ? 'data(label)' : '');
  this.classList.toggle('on', labelsOn);
  this.textContent = labelsOn ? 'Labels ✓' : 'Edge Labels';
});

// ── FIT ───────────────────────────────────────────────────────────────────────
document.getElementById('btn-fit').addEventListener('click', () => cy.fit(undefined, 40));

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetAll() {
  cy.elements().removeClass('dim hl src tgt found');
  document.querySelectorAll('.mi').forEach(el => el.classList.remove('active'));
  document.getElementById('search').value = '';
  closePanel();
}
document.getElementById('btn-reset').addEventListener('click', resetAll);
cy.on('tap', e => { if(e.target === cy) resetAll(); });

// ── NODE CLICK → info panel ───────────────────────────────────────────────────
cy.on('tap', 'node', function(e){
  const node = e.target;
  const id = node.id();
  const mod = node.data('module');

  document.getElementById('p-name').textContent = id;
  const badge = document.getElementById('p-badge');
  badge.textContent = mod; badge.style.background = MOD_COLOR[mod];

  const mkList = (edges, ulId, dir) => {
    const ul = document.getElementById(ulId); ul.innerHTML = '';
    if(!edges.length){ ul.innerHTML='<li style="color:#aaa;cursor:default">—</li>'; return; }
    edges.forEach(edge => {
      const other = dir==='out' ? edge.target() : edge.source();
      const lbl = edge.data('label');
      const li = document.createElement('li');
      li.innerHTML = `${other.id()}${lbl ? ` <small>(${lbl})</small>` : ''}`;
      li.onclick = () => { cy.animate({fit:{eles:other,padding:80}},{duration:400}); };
      ul.appendChild(li);
    });
  };
  mkList(node.outgoers('edge'), 'p-out', 'out');
  mkList(node.incomers('edge'), 'p-in', 'in');
  document.getElementById('panel').classList.add('open');
});

// ── EDGE CLICK → highlight + pan to target ───────────────────────────────────
cy.on('tap', 'edge', function(e){
  resetAll();
  const edge = e.target;
  const src = edge.source(), tgt = edge.target();
  cy.elements().addClass('dim');
  edge.removeClass('dim').addClass('hl');
  src.removeClass('dim').addClass('src');
  tgt.removeClass('dim').addClass('tgt');
  cy.animate({ fit: { eles: tgt, padding: 120 } }, { duration: 500 });
});

// ── TOOLTIP on hover ──────────────────────────────────────────────────────────
const tip = document.getElementById('tip');
cy.on('mouseover', 'edge', function(e){
  const lbl = e.target.data('label');
  if(!lbl) return;
  tip.textContent = lbl;
  tip.style.display = 'block';
});
cy.on('mousemove', 'edge', function(e){
  tip.style.left = (e.originalEvent.clientX+12)+'px';
  tip.style.top  = (e.originalEvent.clientY+12)+'px';
});
cy.on('mouseout', 'edge', () => tip.style.display='none');

// ── DOUBLE-CLICK node → open Frappe URL ──────────────────────────────────────
cy.on('dblclick', 'node', function(e){
  window.open(e.target.data('url'), '_blank');
});

// ── SEARCH ────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  cy.elements().removeClass('dim found');
  if(!q) return;
  cy.nodes().forEach(n => {
    if(!n.id().toLowerCase().includes(q)) n.addClass('dim');
    else if(n.id().toLowerCase()===q) n.addClass('found');
  });
  cy.edges().forEach(e => {
    if(!e.source().id().toLowerCase().includes(q) && !e.target().id().toLowerCase().includes(q))
      e.addClass('dim');
  });
  const exact = cy.getElementById(Object.keys(NM).find(n=>n.toLowerCase()===q)||'');
  if(exact.length) cy.animate({fit:{eles:exact,padding:120}},{duration:400});
});

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
const modList = document.getElementById('mod-list');
Object.entries(MOD_COLOR).forEach(([mod, color]) => {
  const div = document.createElement('div');
  div.className='mi'; div.dataset.mod=mod;
  div.innerHTML=`<span class="dot" style="background:${color}"></span>${mod}`;
  div.addEventListener('click', function(){
    const on = this.classList.toggle('active');
    document.querySelectorAll('.mi').forEach(el=>{ if(el!==this) el.classList.remove('active'); });
    cy.elements().removeClass('dim');
    if(!on) return;
    cy.nodes().forEach(n => { if(n.data('module')!==mod) n.addClass('dim'); });
    cy.edges().forEach(e => {
      if(e.source().data('module')!==mod && e.target().data('module')!==mod) e.addClass('dim');
    });
    const modNodes = cy.nodes().filter(n=>n.data('module')===mod);
    if(modNodes.length) cy.animate({fit:{eles:modNodes,padding:60}},{duration:500});
  });
  modList.appendChild(div);
});

function closePanel(){ document.getElementById('panel').classList.remove('open'); }
document.getElementById('xbtn').addEventListener('click', closePanel);

// Dynamic base URL — rewrites all links to match the current host
(function(){
  var base = (window.location.hostname !== "")
    ? window.location.protocol + "//" + window.location.host
    : "http://erp.localhost:8080";
  if (base === "http://erp.localhost:8080") return;
  document.querySelectorAll("a[href]").forEach(function(a){
    a.href = a.href.replace(/^http:\/\/erp\.localhost:8080/, base);
  });
  // Also rewrite data-url attributes used by node click handlers
  document.querySelectorAll("[data-url]").forEach(function(el){
    el.dataset.url = el.dataset.url.replace(/^http:\/\/erp\.localhost:8080/, base);
  });
})();
</script>
</body>
